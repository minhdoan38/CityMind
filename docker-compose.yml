services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_API_URL: http://backend:8000
      NEXT_PUBLIC_SUPABASE_URL: http://host.docker.internal:54321
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
